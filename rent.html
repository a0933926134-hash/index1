let markerLayer = L.layerGroup().addTo(map);
let circleLayer = L.layerGroup().addTo(map);
let labelPositions=[];

function shouldShowLabel(latlng,zoom){
  if(zoom<12) return false;
  const p=map.latLngToContainerPoint(latlng);
  for(let q of labelPositions){
    if(Math.hypot(p.x-q.x,p.y-q.y)<80) return false;
  }
  labelPositions.push(p);
  return true;
}

function getFilteredData(){
  const d=document.getElementById("districtFilter").value;
  const s=document.getElementById("seasonFilter").value;
  return data.filter(x=>(d==="all"||x.district===d)&&(s==="all"||x.season===s));
}

function quantile(arr,q){
  arr=arr.slice().sort((a,b)=>a-b);
  const p=(arr.length-1)*q;
  const b=Math.floor(p);
  const r=p-b;
  return arr[b+1]!==undefined?arr[b]+r*(arr[b+1]-arr[b]):arr[b];
}

function drawRadius(lat,lng){
  circleLayer.clearLayers();
  L.circle([lat,lng],{
    radius:2000,
    color:"#60a5fa",
    fillColor:"#93c5fd",
    fillOpacity:0.25
  }).addTo(circleLayer);
}

function go(lat,lng){
  map.flyTo([lat,lng],16);
  drawRadius(lat,lng);
}

function render(list){
  markerLayer.clearLayers();
  labelPositions=[];
  const el=document.getElementById("list");
  el.innerHTML="";

  const grouped={};
  list.forEach(d=>{
    if(!grouped[d.name]) grouped[d.name]=[];
    grouped[d.name].push(d);
  });

  Object.keys(grouped).forEach(name=>{
    const items=grouped[name];
    const first=items[0];

    const types={雅房:[],套房:[],整層:[]};
    items.forEach(i=>{
      types.雅房.push(i.rents.雅房);
      types.套房.push(i.rents.套房);
      types.整層.push(i.rents.整層);
    });

    const icon=L.divIcon({
      className:"",
      html:`<div style="text-align:center;">
        <div style="width:22px;height:22px;background:#ea4335;border-radius:50% 50% 50% 0;transform:rotate(-45deg);margin:auto;"></div>
        ${shouldShowLabel(L.latLng(first.lat,first.lng),map.getZoom())?
          `<div class="gis-label"><div class="label">${name}</div></div>`:""}
      </div>`,
      iconSize:[120,50],
      iconAnchor:[60,25]
    });

    L.marker([first.lat,first.lng],{icon}).addTo(markerLayer);

    const row=(label,arr)=>`
      <tr><th>${label}</th>
      <td>${quantile(arr,0.25).toFixed(0)}</td>
      <td>${quantile(arr,0.5).toFixed(0)}</td>
      <td>${quantile(arr,0.75).toFixed(0)}</td></tr>`;

    const card=document.createElement("div");
    card.className="card";
    card.onclick=()=>go(first.lat,first.lng);

    card.innerHTML=`
      <div class="name">${name}</div>
      <div class="meta">${first.district}</div>

      <table class="price-table">
        <tr><th></th><th>25分位</th><th>中位數</th><th>75分位</th></tr>
        ${row("雅房",types.雅房)}
        ${row("套房",types.套房)}
        ${row("整層",types.整層)}
      </table>
    `;

    el.appendChild(card);
  });
}

map.on("moveend",()=>render(getFilteredData()));
map.on("zoomend",()=>render(getFilteredData()));
document.getElementById("districtFilter").addEventListener("change",()=>render(getFilteredData()));
document.getElementById("seasonFilter").addEventListener("change",()=>render(getFilteredData()));
